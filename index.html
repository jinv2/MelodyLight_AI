<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MelodyLight AI - 山海寻宝大乐园</title>
    <style>
        :root {
            --gold: #FFD700;
        }
        img, .beast-key {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        body {
            margin: 0; padding: 20px 0; height: 100vh; width: 100vw;
            background: url('/assets/beijing2.webp') no-repeat center center fixed;
            background-size: cover;
            background-position: center center;
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: space-between;
            overflow: hidden; font-family: "Microsoft YaHei", sans-serif;
            box-sizing: border-box;
        }

        /* 官方 LOGO */
        .logo { position: absolute; top: 20px; left: 20px; height: 60px; z-index: 100; filter: drop-shadow(0 0 10px #000); }

        /* 艺术标题 */
        .title {
            font-size: clamp(1.5rem, 5vw, 3.2rem); color: var(--gold);
            text-shadow: -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000, 0 0 20px rgba(255,215,0,0.8);
            margin-bottom: 20px;
            text-align: center;
            width: 90%;
        }

        /* 彩色简谱流 */
        #notation-flow {
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            height: 15vh;
            font-weight: bold;
        }

        /* 神兽按键 */
        .piano-keys {
            display: flex;
            gap: 1.5vw;
            margin-top: 50px;
            width: 95%;
            justify-content: center;
            flex-wrap: nowrap;
        }
        .beast-key {
            width: 12vw; 
            height: 12vw;
            max-width: 130px;
            max-height: 130px;
            min-width: 45px;
            min-height: 45px;
            background-size: contain; background-repeat: no-repeat; background-position: center;
            background-color: rgba(255,255,255,0.15); border-radius: 50%;
            cursor: pointer; transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative; border: 3px solid var(--c);
            box-shadow: 0 0 15px var(--c);
            touch-action: manipulation;
        }
        .beast-key.playing { transform: translateY(-50px) scale(1.3); background-color: var(--c); box-shadow: 0 0 40px var(--c); }
        
        /* 名字与数字 */
        .beast-key::before {
            content: attr(data-note);
            position: absolute;
            top: -4vh;
            left: 50%;
            transform: translateX(-50%);
            font-size: clamp(1.2rem, 3vw, 2.5rem);
            color: var(--gold);
            text-shadow: 0 0 5px #000;
        }
        .beast-name {
            position: absolute;
            bottom: -3.5vh;
            left: 50%;
            transform: translateX(-50%);
            color: var(--c);
            font-size: clamp(0.8rem, 2vw, 1.6rem);
            font-weight: bold;
            white-space: nowrap;
            text-shadow: 0 0 5px #000;
        }

        /* 版权信息 */
        footer { position: absolute; bottom: 15px; color: rgba(255,215,0,0.6); font-size: 0.9rem; text-shadow: 1px 1px 2px #000; }
        footer a { color: rgba(255,215,0,0.6); text-decoration: none; }
        /* 评价语样式：金色、半透明、带有动态升起效果 */
        #beast-message {
            height: 60px;
            font-size: 2rem;
            color: #FFD700;
            text-shadow: 0 0 10px #000, 0 0 20px rgba(255, 215, 0, 0.5);
            font-weight: bold;
            margin-top: 10px;
            transition: all 0.5s ease;
            opacity: 0;
        }

        .show-msg {
            opacity: 1 !important;
            transform: translateY(-10px);
        }
    </style>
</head>
<body>
    <img src="/assets/logo_ts.webp" class="logo">
    <div class="title">MelodyLight AI: 山海寻宝大乐园</div>
    <div id="notation-flow"></div>
    <div id="beast-message"></div>

    <div class="piano-keys">
        <div class="beast-key" data-note="1" style="--c:#FF4D4D; background-image:url('/assets/beast1.webp')"><div class="beast-name">白泽</div></div>
        <div class="beast-key" data-note="2" style="--c:#FFA500; background-image:url('/assets/beast2.webp')"><div class="beast-name">麒麟</div></div>
        <div class="beast-key" data-note="3" style="--c:#FFD700; background-image:url('/assets/beast3.webp')"><div class="beast-name">貔貅</div></div>
        <div class="beast-key" data-note="4" style="--c:#4DFF88; background-image:url('/assets/beast4.webp')"><div class="beast-name">凤凰</div></div>
        <div class="beast-key" data-note="5" style="--c:#4DFFFF; background-image:url('/assets/beast5.webp')"><div class="beast-name">应龙</div></div>
        <div class="beast-key" data-note="6" style="--c:#4D94FF; background-image:url('/assets/beast6.webp')"><div class="beast-name">甪端</div></div>
        <div class="beast-key" data-note="7" style="--c:#B34DFF; background-image:url('/assets/beast7.webp')"><div class="beast-name">青鸾</div></div>
    </div>

    <footer>© 2026 神思庭艺术智能工作室 (AIS) | <a href="https://shensist.top/">shensist.top</a></footer>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const colorMap = {'1':'#FF4D4D','2':'#FFA500','3':'#FFD700','4':'#4DFF88','5':'#4DFFFF','6':'#4D94FF','7':'#B34DFF'};
        const freqs = {'1':261.6,'2':293.6,'3':329.6,'4':349.2,'5':392,'6':440,'7':493.8};
        const feedbackMsgs = ["神来之笔！", "仙气满满！", "余音绕梁！", "灵动非凡！", "节奏大师！"];

        function play(n) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(freqs[n], audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1);
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 1);

            const flow = document.getElementById('notation-flow');
            const span = document.createElement('span');
            span.innerText = n + ' '; span.style.color = colorMap[n];
            span.style.textShadow = '0 0 10px ' + colorMap[n];
            flow.appendChild(span);
            if (flow.childNodes.length > 8) flow.removeChild(flow.firstChild);

            const el = document.querySelector(`.beast-key[data-note="${n}"]`);
            el.classList.add('playing'); setTimeout(()=>el.classList.remove('playing'), 200);

            // 新增：评价语逻辑
            const msgEl = document.getElementById('beast-message');
            msgEl.innerText = `【${n}】` + feedbackMsgs[Math.floor(Math.random() * feedbackMsgs.length)];
            
            msgEl.classList.remove('show-msg');
            void msgEl.offsetWidth; // 触发重绘，确保动画重复播放
            msgEl.classList.add('show-msg');

            // 3秒后自动淡出
            setTimeout(() => msgEl.classList.remove('show-msg'), 3000);
        }

        window.addEventListener('keydown', e => { if(freqs[e.key]) play(e.key); });
        document.querySelectorAll('.beast-key').forEach(k => k.onclick = () => play(k.dataset.note));
    </script>
</body>
</html>
